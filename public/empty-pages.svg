<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" /> <!-- Indigo-400 -->
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" /> <!-- Purple-400 -->
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Floating Document -->
  <rect x="75" y="60" width="150" height="180" rx="12" fill="white" filter="url(#shadow)" />
  
  <!-- Header Decoration -->
  <rect x="75" y="60" width="150" height="40" rx="12" fill="url(#grad1)" fill-opacity="0.1" />
  <path d="M75 72C75 65.3726 80.3726 60 87 60H213C219.627 60 225 65.3726 225 72V100H75V72Z" fill="url(#grad1)" fill-opacity="0.1"/>

  <!-- Lines -->
  <rect x="100" y="120" width="100" height="8" rx="4" fill="#E2E8F0" />
  <rect x="100" y="145" width="80" height="8" rx="4" fill="#E2E8F0" />
  <rect x="100" y="170" width="90" height="8" rx="4" fill="#E2E8F0" />

  <!-- Abstract Shapes -->
  <circle cx="240" cy="50" r="15" fill="#F472B6" fill-opacity="0.2" /> <!-- Pink circle -->
  <circle cx="50" cy="240" r="10" fill="#34D399" fill-opacity="0.2" /> <!-- Green circle -->

  <!-- Pen/Pencil Icon Floating -->
  <path d="M190 200 L230 240 M230 240 L240 230 L200 190" stroke="#818CF8" stroke-width="4" stroke-linecap="round" />
</svg>
