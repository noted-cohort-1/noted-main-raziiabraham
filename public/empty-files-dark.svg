<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradFolderDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB7185;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFolderDark" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Back Folder Tab -->
  <path d="M60 100 H120 L140 120 H240 V220 H60 V100 Z" fill="#9F1239" /> <!-- Rose-900 -->

  <!-- Front Folder Sheet -->
  <rect x="60" y="120" width="180" height="100" rx="4" fill="#374151" filter="url(#shadowFolderDark)" /> <!-- Gray-700 -->
  
  <!-- Folder Accent -->
  <rect x="60" y="120" width="180" height="100" rx="4" fill="url(#gradFolderDark)" fill-opacity="0.05" stroke="url(#gradFolderDark)" stroke-width="2" />

  <!-- Floating Elements -->
  <rect x="100" y="140" width="30" height="30" rx="4" fill="#4B5563" />
  <circle cx="115" cy="155" r="8" fill="#6B7280" />

  <rect x="150" y="150" width="25" height="35" rx="2" fill="#4B5563" />
  
  <circle cx="250" cy="90" r="20" fill="#60A5FA" fill-opacity="0.1" />
  <circle cx="40" cy="200" r="12" fill="#34D399" fill-opacity="0.1" />

</svg>
