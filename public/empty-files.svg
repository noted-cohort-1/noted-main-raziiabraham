<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradFolder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" /> <!-- Pink-400 -->
      <stop offset="100%" style="stop-color:#FB7185;stop-opacity:1" /> <!-- Rose-400 -->
    </linearGradient>
    <filter id="shadowFolder" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Back Folder Tab -->
  <path d="M60 100 H120 L140 120 H240 V220 H60 V100 Z" fill="#FDA4AF" /> <!-- Light Rose -->

  <!-- Front Folder Sheet -->
  <rect x="60" y="120" width="180" height="100" rx="4" fill="white" filter="url(#shadowFolder)" />
  
  <!-- Folder Accent -->
  <rect x="60" y="120" width="180" height="100" rx="4" fill="url(#gradFolder)" fill-opacity="0.05" stroke="url(#gradFolder)" stroke-width="2" />

  <!-- Floating Elements -->
  <!-- Image Icon -->
  <rect x="100" y="140" width="30" height="30" rx="4" fill="#E2E8F0" />
  <circle cx="115" cy="155" r="8" fill="#94A3B8" />

  <!-- File Icon -->
  <rect x="150" y="150" width="25" height="35" rx="2" fill="#E2E8F0" />
  <path d="M150 150 L165 150 L175 160 L175 185 L150 185 Z" stroke="#94A3B8" stroke-width="1" />
  
  <!-- Abstract Circles -->
  <circle cx="250" cy="90" r="20" fill="#60A5FA" fill-opacity="0.1" />
  <circle cx="40" cy="200" r="12" fill="#34D399" fill-opacity="0.1" />

</svg>
